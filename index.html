<!DOCTYPE html>
<html lang="en">
    <head>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/eruda/3.4.3/eruda.min.js" integrity="sha512-cDmB70h28kl47NuDUcO3/hqJ29T+Gxue9DA6hoENF9RPGN/AZuyI94ATk5MN9VXTiuTHw2v3iVT9sXLzMMF1sQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
	<script>eruda.init();</script>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tetris</title>
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	<style>
         body { background-color: #0f172a; color: white; overflow: clip; font-family: 'Consolas', monospace; }
         #game-container { display: flex; justify-content: center; align-items: center; height: 100dvh; flex-direction: column;}
         #field { 
             position: relative; 
             background-color: #1e293b; 
             border: 4px solid #334155;
             box-shadow: 0 0 20px rgba(0,0,0,0.5);
             /* CRITICAL: content-box ensures the 220px width is for the INSIDE */
             box-sizing: content-box;
	     flex-grow: 2;
         }
         .block { position: absolute; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1); border-radius: 2px; }
         .fixed { border: 2px solid rgba(0,0,0,0.2); }
         .ui-panel { margin-bottom: 1rem; font-size: 1.5rem; font-weight: bold; color: #60a5fa; }
	</style>
    </head>
    <body>

	<div id="game-container">
            <div class="ui-panel"> TETRIS </div>
	    <div>Score: <span id="score"></span> </div>
            <div id="field"></div>
	</div>

	<script>
	 const CONFIG = {
             COLS: 10,
             ROWS: 20,
             INITIAL_SPEED: 800,
	 };
	 const field = document.getElementById('field');
	 const blockSize = Math.floor(field.offsetHeight / CONFIG.ROWS);
	 console.log("fildy", field.offsetHeight)
	 console.log("blockysize:", blockSize)
	 field.style.width = `${CONFIG.COLS * blockSize}px`;
	 field.style.height = `${CONFIG.ROWS * blockSize}px`;
	 const scoreElement = document.getElementById('score');
	 let matrix = Array.from({ length: CONFIG.ROWS }, () => Array(CONFIG.COLS).fill(null));
	 let gameActive = true;
	 let score = 0;
	 class Tetromino {
             constructor(coords, color) {
		 this.coords = coords;
		 this.color = color;
		 
		 // Calculate width to center it properly
		 const minX = Math.min(...this.coords.map(c => c[0]));
		 const maxX = Math.max(...this.coords.map(c => c[0]));
		 const pieceWidth = maxX - minX + 1;
		 
		 this.x = Math.floor((CONFIG.COLS - pieceWidth) / 2) - minX;
		 this.y = 0;

		 this.elements = this.createElements();
             }

             createElements() {
		 return this.coords.map(() => {
                     const el = document.createElement('div');
                     el.className = `block ${this.color}`;
                     el.style.width = el.style.height = `${blockSize}px`;
                     field.appendChild(el);
                     return el;
		 });
             }

             canMoveTo(nextX, nextY, nextCoords = this.coords) {
		 return nextCoords.every(([dx, dy]) => {
                     const nx = nextX + dx;
                     const ny = nextY + dy;
                     return (
			 nx >= 0 && nx < CONFIG.COLS &&
			 ny < CONFIG.ROWS &&
			 (ny < 0 || !matrix[ny][nx])
                     );
		 });
             }

             rotate() {
		 const rotated = this.coords.map(([dx, dy]) => [-dy, dx]);
		 // Wall Kick Logic
		 const positions = [this.x, this.x - 1, this.x + 1, this.x - 2, this.x + 2];
		 for (let pos of positions) {
                     if (this.canMoveTo(pos, this.y, rotated)) {
			 this.x = pos;
			 this.coords = rotated;
			 return;
                     }
		 }
             }

             draw() {
		 this.coords.forEach(([dx, dy], i) => {
                     this.elements[i].style.left = `${(this.x + dx) * blockSize}px`;
                     this.elements[i].style.top = `${(this.y + dy) * blockSize}px`;
		 });
             }

             destroy() {
		 this.elements.forEach(el => el.remove());
             }
	     
	     calculateScore() {
		 return this.elements.length
	     }
	     
	 }

	 const PIECE_RECIPES = [
             { coords: [[0,0], [-1,0], [1,0], [0,1]], color: 'bg-green-500' }, // T
             { coords: [[0,0], [1,0], [0,1], [1,1]], color: 'bg-yellow-500' }, // Square
             { coords: [[0,0], [-1, 0], [1, 0], [-2, 0]], color: 'bg-cyan-500' },   // Line
             { coords: [[0,0], [-1,0], [1,0], [1, 1]], color: 'bg-blue-500' },  // L
	     { coords: [[0,0], [-1,0], [1,0], [1, - 1]], color: 'bg-purple-500' }, // anti L
	     { coords: [[0,0], [-1,0], [0,1], [1,1]], color: 'bg-orange-500' },//Z
	     { coords: [[0,0], [1,0], [0,1], [-1,1]], color: 'bg-red-500' },//retarded Z
	 ];
	 
	 function getRandomTetromino() {
             const idx = Math.floor(Math.random() * PIECE_RECIPES.length);
             const recipe = PIECE_RECIPES[idx];
             return new Tetromino(recipe.coords, recipe.color);
	 }
	 updateScoreDisplay()
	 let currentPiece = getRandomTetromino();
	 let lastDropTime = 0;

	 function drop() {
             if (currentPiece.canMoveTo(currentPiece.x, currentPiece.y + 1)) {
		 currentPiece.y++;
             } else {
		 lockPiece();
             }
	 }

	 function lockPiece() {
             let overflow = false;
             currentPiece.coords.forEach(([dx, dy]) => {
		 const finalX = currentPiece.x + dx;
		 const finalY = currentPiece.y + dy;
		 if (finalY < 0) {
                     overflow = true;
		 } else {
                     matrix[finalY][finalX] = currentPiece.color;
                     const el = document.createElement('div');
                     el.className = `block fixed ${currentPiece.color}`;
                     el.style.width = el.style.height = `${blockSize}px`;
                     el.style.left = `${finalX * blockSize}px`;
                     el.style.top = `${finalY * blockSize}px`;
                     field.appendChild(el);
		 }
             });


	     const rowsIds = findFilledRowIdxs()
	     if (rowsIds.length > 0) {
		 overflow = false // TODO: Make a smarter check for overflow size
		 destroyFilledRows(rowsIds);
		 reRenderField();
		 
	     }
	     
             currentPiece.destroy();
	     
             if (overflow) {
		 gameActive = false;
		 alert("GAME OVER: " + score);
		 location.reload();
		 return;
             }
	     
	     score += currentPiece.calculateScore()
	     updateScoreDisplay()
             currentPiece = getRandomTetromino();
             if (!currentPiece.canMoveTo(currentPiece.x, currentPiece.y)) {
		 gameActive = false;
		 alert("GAME OVER: " + score);
		 location.reload();
             }
	 }

	 function findFilledRowIdxs() {
	     return matrix.map((row, idx) =>({row, idx}))
			  .filter(({ row }) => row.every(cell => cell !== null))
			  .map(({ idx }) => idx)
	 }

	 function updateScoreDisplay() {
	     scoreElement.innerText = score;
	 }


	 function destroyFilledRows(rowIdxs) {
	     for (const rowIdxToDestory of rowIdxs) {
		 
		 for (let i = rowIdxToDestory; i > 0; i--) {
		     for (let j = 0; j < matrix[i].length;j++) {
			 matrix[i][j] = matrix[i - 1][j]
		     }
		 }

		 for (let i = 0; i < matrix[0].length; i++) {
		     matrix[0][i] = null;
		 }
	     }
	     
	 }

	 function reRenderField() {
	     document.querySelectorAll('.fixed').forEach(el => el.remove());
	     for (let i = 0; i < matrix.length; i++) {
		 for (let j = 0; j < matrix[i].length; j++){
		     const color =  matrix[i][j]
		     if (color == null) {
			 continue
		     }
		     const el = document.createElement('div');
		     el.className = `block fixed ${color}`;
		     el.style.width = el.style.height = `${blockSize}px`;
		     el.style.left = `${j * blockSize}px`;
		     el.style.top = `${i * blockSize}px`;
		     field.appendChild(el);
		 }
	     }
	 }

	 // Whatever change I've made
	 
	 function gameLoop(now) {
             if (!gameActive) return;
             if (now - lastDropTime > CONFIG.INITIAL_SPEED) {
		 drop();
		 lastDropTime = now;
             }
             currentPiece.draw();
             requestAnimationFrame(gameLoop);
	 }

	 // Movement control
	 const movementHandler = {
	     up: () => {
		 currentPiece.rotate()
	     },
	     down: () => {
		 drop()
	     },
	     left: () => {
		 if(currentPiece.canMoveTo(currentPiece.x - 1, currentPiece.y)){
		     currentPiece.x--;  
		 }
	     },
	     right: ()=> {
		 if (currentPiece.canMoveTo(currentPiece.x + 1, currentPiece.y)){
		     currentPiece.x++;
		 }
	     },
	 };
	 // touch gestures and spipes :D
	 let xStart = 0;
	 let yStart = 0;
	 
	 window.addEventListener("touchstart", (e) => {
	     xStart = e.changedTouches[0].pageX;
	     yStart = e.changedTouches[0].pageY;

	 });
	 
	 window.addEventListener("touchend", (e) => {
	     let direction
	     let xEnd = e.changedTouches[0].pageX;
	     let yEnd = e.changedTouches[0].pageY;
	     dX = xStart - xEnd
	     dY = yStart - yEnd
	     xStart = 0
	     yStart = 0
	     console.debug("delta", dY, dX)
	     if(Math.abs(dX) > Math.abs(dY)){
		 if(dX > 0){
		     direction = "left"
		 } else {
		     direction = "right"
		 }
	     } else {
		 if(dY > 0){
		     direction = "up"		     
		 } else {
		     drop()		     
		 }
	     }
	     movementHandler[direction]()
	 });
	 

	 // keyboard controls
	 window.addEventListener('keydown', (e) => {
	     let direction
             if (!gameActive) return;
             if (e.key === 'ArrowLeft') {
		 direction = "left";
	     }
	     else if (e.key === 'ArrowRight'){
		 direction = "right"
	     }
	     else if (e.key === 'ArrowDown') {
		 direction = "down"
	     }
             else if (e.key === 'ArrowUp') {
		 direction = "up"
	     }
	     movementHandler[direction]()
	 });

	 requestAnimationFrame(gameLoop);
	</script>
    </body>
</html>
